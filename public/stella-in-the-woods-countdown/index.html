<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stella in the Woods — The Countdown</title>
  <meta name="description" content="Counting down the hours and minutes until Friday, June 19th. Stella in the Woods." />
  <meta name="theme-color" content="#05080a" />
  <meta property="og:title" content="Stella in the Woods — The Countdown" />
  <meta property="og:description" content="The forest is waiting. Counting down to Friday, June 19th." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080a;
      --fog: #0c1116;
      --mist: #16202a;
      --text: #e9efe9;
      --muted: #6d7c72;
      --glow: #9fe6b8;
      --glow-soft: rgba(159, 230, 184, 0.55);
      --amber: #e8c98a;
      --blood: #b5403a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layered forest fog ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(120% 90% at 50% -10%, #0e1a18 0%, transparent 55%),
        radial-gradient(130% 100% at 50% 120%, #08120d 0%, transparent 60%),
        linear-gradient(180deg, #05080a 0%, #060b0c 45%, #04070a 100%);
    }

    /* moon */
    .moon {
      position: absolute;
      top: 8%;
      left: 50%;
      width: 240px;
      height: 240px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #f4f7ec 0%, #cdd9c4 38%, #8fa394 60%, transparent 72%);
      box-shadow: 0 0 120px 50px rgba(180, 210, 190, 0.18);
      filter: blur(0.4px);
      opacity: 0.9;
      animation: moonPulse 9s ease-in-out infinite;
    }
    @keyframes moonPulse {
      0%, 100% { box-shadow: 0 0 120px 50px rgba(180,210,190,0.16); }
      50%      { box-shadow: 0 0 150px 70px rgba(180,210,190,0.26); }
    }

    .fog-layer {
      position: absolute;
      left: -50%;
      width: 200%;
      height: 60%;
      background: radial-gradient(60% 80% at 50% 50%, rgba(80,110,95,0.10) 0%, transparent 70%);
      mix-blend-mode: screen;
      animation: drift 38s linear infinite;
    }
    .fog-layer.f1 { bottom: 0;   opacity: 0.7; animation-duration: 46s; }
    .fog-layer.f2 { bottom: 18%; opacity: 0.5; animation-duration: 64s; animation-direction: reverse; }
    .fog-layer.f3 { bottom: 38%; opacity: 0.35; animation-duration: 82s; }
    @keyframes drift {
      from { transform: translateX(0); }
      to   { transform: translateX(25%); }
    }

    /* tree silhouettes */
    .trees {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55vh;
      background:
        linear-gradient(180deg, transparent 0%, #02060a 92%);
      z-index: 2;
    }
    .tree {
      position: absolute;
      bottom: -2px;
      width: 0;
      height: 0;
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid #02050700;
    }
    .treeline {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50vh;
      background:
        radial-gradient(40px 240px at 6%  100%, #02060a 60%, transparent 62%),
        radial-gradient(54px 320px at 16% 100%, #030708 60%, transparent 62%),
        radial-gradient(38px 220px at 27% 100%, #02060a 60%, transparent 62%),
        radial-gradient(70px 380px at 39% 100%, #020506 60%, transparent 62%),
        radial-gradient(44px 260px at 52% 100%, #02060a 60%, transparent 62%),
        radial-gradient(60px 340px at 64% 100%, #030708 60%, transparent 62%),
        radial-gradient(40px 240px at 75% 100%, #02060a 60%, transparent 62%),
        radial-gradient(58px 360px at 86% 100%, #020506 60%, transparent 62%),
        radial-gradient(46px 280px at 96% 100%, #02060a 60%, transparent 62%);
      z-index: 3;
    }

    /* drifting embers / fireflies */
    .ember {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--glow);
      box-shadow: 0 0 8px 2px var(--glow-soft);
      opacity: 0;
      z-index: 4;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-90vh) translateX(40px); opacity: 0; }
    }

    /* vignette */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(120% 100% at 50% 45%, transparent 40%, rgba(0,0,0,0.65) 100%);
    }

    /* ── Content ── */
    main {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8vh 22px 12vh;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
      padding-left: 0.55em;
      opacity: 0;
      animation: fadeUp 1.4s ease 0.2s forwards;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      line-height: 0.98;
      font-size: clamp(2.6rem, 9vw, 6.5rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
      background: linear-gradient(180deg, #ffffff 0%, #cfe9d6 45%, #7fae8f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 38px rgba(159, 230, 184, 0.25);
      opacity: 0;
      animation: emerge 2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }
    h1 .in-the {
      display: block;
      font-size: 0.34em;
      letter-spacing: 0.5em;
      font-weight: 400;
      color: var(--amber);
      -webkit-text-fill-color: var(--amber);
      margin: 0.5rem 0 0.3rem;
      text-shadow: 0 0 24px rgba(232, 201, 138, 0.3);
    }

    .tagline {
      font-style: italic;
      font-size: clamp(1.05rem, 2.6vw, 1.5rem);
      color: #b9c7bd;
      max-width: 30ch;
      margin: 1.6rem auto 0;
      opacity: 0;
      animation: fadeUp 1.6s ease 0.9s forwards;
    }

    .when {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--glow);
      margin-top: 1.1rem;
      opacity: 0;
      animation: fadeUp 1.6s ease 1.1s forwards;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: clamp(0.6rem, 2.6vw, 2.4rem);
      margin-top: clamp(2.4rem, 6vh, 4rem);
      opacity: 0;
      animation: fadeUp 1.8s ease 1.3s forwards;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: clamp(64px, 18vw, 130px);
    }
    .unit .num {
      font-family: 'Cinzel', serif;
      font-weight: 800;
      font-size: clamp(2.6rem, 11vw, 6rem);
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 30px rgba(159, 230, 184, 0.22);
      position: relative;
    }
    .unit .num.tick { animation: tick 0.6s ease; }
    @keyframes tick {
      0%   { color: var(--glow); text-shadow: 0 0 44px var(--glow-soft); transform: translateY(-3px); }
      100% { color: var(--text); transform: translateY(0); }
    }
    .unit .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.9rem;
      padding-left: 0.32em;
    }
    .sep {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 8vw, 4.5rem);
      color: var(--mist);
      align-self: flex-start;
      margin-top: clamp(0.2rem, 1.5vw, 0.8rem);
      animation: blink 2s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0.25; } }

    .footnote {
      margin-top: clamp(2.6rem, 7vh, 4.5rem);
      font-family: 'Space Mono', monospace;
      font-size: 0.64rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 2s ease 1.7s forwards;
    }
    .footnote a { color: var(--glow); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s; }
    .footnote a:hover { border-color: var(--glow); }

    /* arrival state */
    .arrived h1 { animation: emerge 2s cubic-bezier(0.16,1,0.3,1) forwards, glowPulse 3s ease-in-out infinite 2s; }
    .arrived .countdown { display: none; }
    .arrival-msg {
      display: none;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: clamp(1.6rem, 5vw, 3rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin-top: clamp(2.4rem, 6vh, 4rem);
      text-shadow: 0 0 40px rgba(232,201,138,0.4);
    }
    .arrived .arrival-msg { display: block; animation: emerge 1.6s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes glowPulse {
      0%,100% { text-shadow: 0 0 38px rgba(159,230,184,0.25); }
      50%     { text-shadow: 0 0 70px rgba(159,230,184,0.55); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes emerge {
      from { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @media (max-width: 480px) {
      .sep { display: none; }
      .countdown { gap: 0.5rem; flex-wrap: wrap; max-width: 320px; }
      .unit { min-width: 70px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .fog-layer, .ember, .moon, .sep { animation: none !important; }
      .eyebrow, h1, .tagline, .when, .countdown, .footnote { animation: none !important; opacity: 1 !important; transform: none !important; filter: none !important; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="moon"></div>
    <div class="fog-layer f1"></div>
    <div class="fog-layer f2"></div>
    <div class="fog-layer f3"></div>
    <div class="treeline"></div>
    <div class="trees"></div>
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <main id="app">
    <p class="eyebrow">She walks among the pines</p>
    <h1>Stella<span class="in-the">in the</span>Woods</h1>
    <p class="tagline">The mist is gathering. The trees are listening. Something stirs beneath the canopy.</p>
    <p class="when">Friday · June 19th</p>

    <div class="countdown" id="countdown" role="timer" aria-live="polite">
      <div class="unit"><span class="num" id="days">--</span><span class="label">Days</span></div>
      <span class="sep">:</span>
      <div class="unit"><span class="num" id="hours">--</span><span class="label">Hours</span></div>
      <span class="sep">:</span>
      <div class="unit"><span class="num" id="minutes">--</span><span class="label">Minutes</span></div>
      <span class="sep">:</span>
      <div class="unit"><span class="num" id="seconds">--</span><span class="label">Seconds</span></div>
    </div>

    <p class="arrival-msg">The woods have woken. Stella is here.</p>

    <p class="footnote"><a href="/">christopherrathbun.com</a></p>
  </main>

  <script>
    (function () {
      // Target: Friday, June 19th. Pick the upcoming June 19 (this year if it
      // hasn't passed, otherwise next year). Midnight local time.
      function targetDate() {
        const now = new Date();
        let year = now.getFullYear();
        let t = new Date(year, 5, 19, 0, 0, 0, 0); // month 5 = June
        if (t.getTime() <= now.getTime() - 24 * 3600 * 1000) {
          // June 19 already fully passed this year → next year
          t = new Date(year + 1, 5, 19, 0, 0, 0, 0);
        }
        return t;
      }

      const target = targetDate();
      const app = document.getElementById('app');
      const els = {
        days: document.getElementById('days'),
        hours: document.getElementById('hours'),
        minutes: document.getElementById('minutes'),
        seconds: document.getElementById('seconds'),
      };
      const last = { days: null, hours: null, minutes: null, seconds: null };

      function pad(n, width) {
        return String(n).padStart(width, '0');
      }

      function set(key, value, width) {
        const text = pad(value, width);
        if (last[key] === text) return;
        last[key] = text;
        const el = els[key];
        el.textContent = text;
        el.classList.remove('tick');
        // force reflow to restart the animation
        void el.offsetWidth;
        el.classList.add('tick');
      }

      function spawnEmbers() {
        const scene = document.querySelector('.scene');
        const count = 26;
        for (let i = 0; i < count; i++) {
          const e = document.createElement('div');
          e.className = 'ember';
          e.style.left = Math.random() * 100 + 'vw';
          e.style.bottom = (Math.random() * 30) + 'vh';
          const dur = 9 + Math.random() * 12;
          e.style.animationDuration = dur + 's';
          e.style.animationDelay = (-Math.random() * dur) + 's';
          const s = 2 + Math.random() * 2.5;
          e.style.width = s + 'px';
          e.style.height = s + 'px';
          e.style.opacity = 0.4 + Math.random() * 0.5;
          scene.appendChild(e);
        }
      }

      function update() {
        const diff = target.getTime() - Date.now();
        if (diff <= 0) {
          app.classList.add('arrived');
          document.title = 'Stella is here — Stella in the Woods';
          return false;
        }
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        set('days', days, 2);
        set('hours', hours, 2);
        set('minutes', minutes, 2);
        set('seconds', seconds, 2);

        document.title = pad(hours, 2) + ':' + pad(minutes, 2) + ':' + pad(seconds, 2) + ' — Stella in the Woods';
        return true;
      }

      spawnEmbers();
      update();
      const timer = setInterval(function () {
        if (!update()) clearInterval(timer);
      }, 1000);
    })();
  </script>
</body>
</html>
