<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Christopher Rathbun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --card: #111111;
      --card-hover: #161616;
      --border: #1e1e1e;
      --border-2: #2a2a2a;
      --text: #e8e8e8;
      --text-2: #888888;
      --text-3: #444444;
      --accent: #ff6a3d;
      --accent-soft: rgba(255, 106, 61, 0.12);
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth gate ── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }
    #auth-gate h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    #auth-gate p { color: var(--text-2); font-size: 0.9rem; }
    .btn-signin {
      appearance: none;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-signin:hover { opacity: 0.85; }

    /* ── Layout ── */
    #profile-app { display: none; }
    #profile-app.visible { display: block; }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(12, 12, 12, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-brand {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-2);
      text-decoration: none;
    }
    .nav-brand span { color: var(--text); }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .user-name { font-size: 0.85rem; font-weight: 500; color: var(--text-2); }
    .btn-signout {
      appearance: none;
      background: transparent;
      border: 1px solid var(--border-2);
      color: var(--text-3);
      font: inherit;
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .btn-signout:hover { color: var(--text-2); border-color: var(--text-3); }

    /* ── Main ── */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── Tab bar ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      appearance: none;
      background: transparent;
      border: none;
      border-radius: 10px;
      padding: 10px 8px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-3);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab.active {
      background: var(--card-hover);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .tab:not(.active):hover { color: var(--text-2); }

    /* ── Tab panels ── */
    .panel { display: none; flex-direction: column; gap: 10px; }
    .panel.active { display: flex; }

    /* ── Cards ── */
    .entry-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      transition: background 0.12s, border-color 0.12s;
      cursor: pointer;
    }
    .entry-card:hover { background: var(--card-hover); border-color: var(--border-2); }
    .entry-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      font-size: 15px;
    }
    .entry-body { flex: 1; min-width: 0; }
    .entry-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .entry-sub { font-size: 0.78rem; color: var(--text-2); }
    .entry-date { font-size: 0.75rem; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }

    /* ── People chips for splits ── */
    .split-people { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .split-person {
      font-size: 0.72rem;
      background: var(--border);
      color: var(--text-2);
      padding: 2px 8px;
      border-radius: 999px;
    }

    /* ── Open link ── */
    .open-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      margin-top: 6px;
      opacity: 0.8;
      transition: opacity 0.12s;
    }
    .open-link:hover { opacity: 1; }

    /* ── Empty / loading states ── */
    .state-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-3);
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .state-box .icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    @media (max-width: 480px) {
      nav { padding: 12px 16px; }
      main { padding: 20px 14px 60px; }
    }
  </style>
</head>
<body>

  <!-- Auth gate shown when signed out -->
  <div id="auth-gate">
    <h1>Your Profile</h1>
    <p>Sign in to view your saved journals, moods, and splits.</p>
    <button class="btn-signin" id="signin-btn">Sign in</button>
  </div>

  <!-- Profile app shown when signed in -->
  <div id="profile-app">
    <nav>
      <a href="/" class="nav-brand">CR <span>/ Profile</span></a>
      <div class="nav-user">
        <div class="user-avatar" id="user-avatar"></div>
        <span class="user-name" id="user-name"></span>
        <button class="btn-signout" id="signout-btn">Sign out</button>
      </div>
    </nav>

    <main>
      <div class="tabs">
        <button class="tab active" data-panel="splits">Splits</button>
        <button class="tab" data-panel="journal">Journal</button>
        <button class="tab" data-panel="mood">Mood</button>
      </div>

      <!-- Splits panel -->
      <div class="panel active" id="panel-splits">
        <div class="state-box" id="splits-loading">
          <div class="loading-dots">Loading splits</div>
        </div>
      </div>

      <!-- Journal panel -->
      <div class="panel" id="panel-journal">
        <div class="state-box" id="journal-loading">
          <div class="loading-dots">Loading journal</div>
        </div>
      </div>

      <!-- Mood panel -->
      <div class="panel" id="panel-mood">
        <div class="state-box" id="mood-loading">
          <div class="loading-dots">Loading mood log</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Clerk JS -->
  <script>window.__CLERK_PK__ = "pk_live_Y2xlcmsuY2hyaXN0b3BoZXJyYXRoYnVuLmNvbSQ";</script>
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" crossorigin="anonymous"></script>

  <script>
    // ── Helpers ───────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const fmt = (n, ccy = 'USD') => {
      try { return new Intl.NumberFormat('en-US', { style: 'currency', currency: ccy }).format(n || 0); }
      catch { return `$${(n || 0).toFixed(2)}`; }
    };
    const fmtDate = ts => {
      const d = new Date(ts > 1e12 ? ts : ts * 1000);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };
    const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    // ── Tab switching ─────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        $('panel-' + btn.dataset.panel).classList.add('active');
      });
    });

    // ── API calls ─────────────────────────────────────────────────────────────
    async function apiFetch(url, getToken) {
      const token = await getToken();
      if (!token) return null;
      const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } }).catch(() => null);
      if (!r || !r.ok) return null;
      return r.json().catch(() => null);
    }

    // ── Render splits ─────────────────────────────────────────────────────────
    function renderSplits(panel, list) {
      panel.innerHTML = '';
      if (!list || list.length === 0) {
        panel.innerHTML = `<div class="state-box"><div class="icon">🧾</div>No saved splits yet.<br><a href="/splitbill/" class="open-link">Open SplitBill →</a></div>`;
        return;
      }
      panel.innerHTML = `<div class="section-label">${list.length} split${list.length === 1 ? '' : 's'}</div>`;
      list.slice(0, 20).forEach(entry => {
        const total = entry.receipt?.total ||
          (entry.items || []).reduce((s, it) => s + it.qty * it.price, 0);
        const names = (entry.people || []).map(p => p.name);
        const date = fmtDate(entry.savedAt);
        const div = document.createElement('div');
        div.className = 'entry-card';
        div.innerHTML = `
          <div class="entry-icon">🧾</div>
          <div class="entry-body">
            <div class="entry-title">${esc(names.join(', ') || 'Split')}</div>
            <div class="entry-sub">${fmt(total, entry.receipt?.currency)}</div>
            <div class="split-people">${names.map(n => `<span class="split-person">${esc(n)}</span>`).join('')}</div>
            <a class="open-link" href="/splitbill/" target="_blank">Open SplitBill ↗</a>
          </div>
          <div class="entry-date">${esc(date)}</div>
        `;
        panel.appendChild(div);
      });
    }

    // ── Render journal ────────────────────────────────────────────────────────
    function renderJournal(panel, data) {
      panel.innerHTML = '';
      const entries = data?.entries || [];
      if (entries.length === 0) {
        panel.innerHTML = `<div class="state-box"><div class="icon">📓</div>No journal entries yet.<br><a href="/journal/" class="open-link">Open Journal →</a></div>`;
        return;
      }
      panel.innerHTML = `<div class="section-label">${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}</div>`;
      entries.slice(0, 20).forEach(e => {
        const div = document.createElement('div');
        div.className = 'entry-card';
        div.style.cursor = 'default';
        const preview = (e.body || '').replace(/<[^>]*>/g, '').slice(0, 80) + ((e.body || '').length > 80 ? '…' : '');
        div.innerHTML = `
          <div class="entry-icon">📓</div>
          <div class="entry-body">
            <div class="entry-title">${esc(e.title || 'Untitled')}</div>
            ${preview ? `<div class="entry-sub">${esc(preview)}</div>` : ''}
            <a class="open-link" href="/journal/" target="_blank">Open Journal ↗</a>
          </div>
          <div class="entry-date">${esc(e.date || '')}</div>
        `;
        panel.appendChild(div);
      });
    }

    // ── Render mood ───────────────────────────────────────────────────────────
    function renderMood(panel, data) {
      panel.innerHTML = '';
      const entries = data?.entries || (Array.isArray(data) ? data : []);
      if (!entries || entries.length === 0) {
        panel.innerHTML = `<div class="state-box"><div class="icon">🌤</div>No mood entries yet.<br><a href="/mood-log/" class="open-link">Open Mood Log →</a></div>`;
        return;
      }
      panel.innerHTML = `<div class="section-label">${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}</div>`;
      entries.slice(0, 20).forEach(e => {
        const div = document.createElement('div');
        div.className = 'entry-card';
        div.style.cursor = 'default';
        div.innerHTML = `
          <div class="entry-icon">🌤</div>
          <div class="entry-body">
            <div class="entry-title">${esc(e.mood || e.label || e.title || 'Entry')}</div>
            ${e.note ? `<div class="entry-sub">${esc(e.note.slice(0, 80))}</div>` : ''}
            <a class="open-link" href="/mood-log/" target="_blank">Open Mood Log ↗</a>
          </div>
          <div class="entry-date">${esc(e.date || fmtDate(e.savedAt || e.created_at || Date.now()))}</div>
        `;
        panel.appendChild(div);
      });
    }

    // ── Clerk init ────────────────────────────────────────────────────────────
    async function init() {
      const clerk = window.Clerk;
      if (!clerk) return;
      await clerk.load({ publishableKey: window.__CLERK_PK__ });

      const getToken = () => clerk.session?.getToken() ?? Promise.resolve(null);

      function renderUser(user) {
        const name = user.firstName || user.username || user.emailAddresses?.[0]?.emailAddress?.split('@')[0] || 'You';
        const initials = name.split(/\s+/).map(s => s[0]).join('').slice(0, 2).toUpperCase();
        const avatarEl = $('user-avatar');
        if (user.imageUrl) {
          avatarEl.innerHTML = `<img src="${esc(user.imageUrl)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="${esc(name)}"/>`;
        } else {
          avatarEl.textContent = initials;
        }
        $('user-name').textContent = name;
      }

      async function loadData(user) {
        renderUser(user);

        // Load splits
        const splitsPanel = $('panel-splits');
        apiFetch('/splitbill/api/data?key=splits:list', getToken).then(body => {
          renderSplits(splitsPanel, body?.data);
        }).catch(() => {
          splitsPanel.innerHTML = `<div class="state-box">Couldn't load splits.</div>`;
        });

        // Load journal
        const journalPanel = $('panel-journal');
        apiFetch('/journal/api/entries', getToken).then(data => {
          renderJournal(journalPanel, data);
        }).catch(() => {
          journalPanel.innerHTML = `<div class="state-box">Couldn't load journal.</div>`;
        });

        // Load mood (stored in user_data under 'mood:entries' if it exists)
        const moodPanel = $('panel-mood');
        apiFetch('/splitbill/api/data?key=mood:entries', getToken).then(body => {
          renderMood(moodPanel, body?.data);
        }).catch(() => {
          moodPanel.innerHTML = `<div class="state-box"><div class="icon">🌤</div>No mood entries yet.<br><a href="/mood-log/" class="open-link">Open Mood Log →</a></div>`;
        });
      }

      function onAuthChange() {
        const user = clerk.user;
        if (user) {
          $('auth-gate').style.display = 'none';
          $('profile-app').classList.add('visible');
          loadData(user);
        } else {
          $('auth-gate').style.display = 'flex';
          $('profile-app').classList.remove('visible');
        }
      }

      clerk.addListener(onAuthChange);
      onAuthChange();

      $('signin-btn').addEventListener('click', () => clerk.openSignIn({ afterSignInUrl: '/profile' }));
      $('signout-btn').addEventListener('click', () => clerk.signOut());
    }

    init().catch(console.error);
  </script>
</body>
</html>
