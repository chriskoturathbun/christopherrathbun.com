<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reminders — Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/reminders/reminders.css" />
  <style>
    .admin-wrap { max-width: 920px; margin: 0 auto; padding: 40px 24px 80px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .topbar h1 { font-size: clamp(28px,4vw,40px); margin:0; }
    .totals { display:flex; gap:20px; flex-wrap:wrap; padding:18px 22px; margin-bottom:24px; }
    .totals .big { font-size:22px; font-weight:700; }
    .acct { padding:22px 24px; margin-bottom:18px; }
    .acct-head { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
    .acct-email { font-size:18px; font-weight:600; letter-spacing:-0.01em; word-break:break-all; }
    .badge { display:inline-block; padding:5px 12px; border-radius:999px; font-size:12.5px; font-weight:600; letter-spacing:.01em; }
    .badge-ok { background: rgba(86,211,140,0.16); color:#7ce6a8; border:1px solid rgba(86,211,140,0.35); }
    .badge-pending { background: rgba(255,196,84,0.15); color:#ffd083; border:1px solid rgba(255,196,84,0.35); }
    .acct-usage { font-size:14px; margin:8px 0 4px; }
    .patients { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
    .patient { display:flex; align-items:center; gap:12px; padding:10px 14px; border:1px solid var(--border); border-radius:14px; background: var(--glass); flex-wrap:wrap; }
    .patient .pname { font-weight:600; }
    .patient .pphone { font-size:13.5px; }
    .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600; text-transform:capitalize; border:1px solid var(--border); }
    .pill-active { background: rgba(86,211,140,0.14); color:#7ce6a8; }
    .pill-pending { background: rgba(255,196,84,0.13); color:#ffd083; }
    .pill-paused { background: rgba(138,180,255,0.14); color:#9cc0ff; }
    .btn-sm { padding:8px 16px; font-size:14px; }
    .spacer { flex:1 1 auto; }
    .err { color:#ff9b9b; font-size:14px; margin-top:10px; }
    .gate { max-width:420px; margin:14vh auto 0; padding:34px 30px; text-align:center; }
    .gate input { width:100%; padding:13px 16px; border-radius:14px; border:1px solid var(--border); background: var(--glass-strong); color: var(--text); font-size:15px; margin:16px 0; font-family:var(--font); }
    .gate input:focus { outline:none; border-color: var(--accent); }
    .hidden { display:none; }
    .muted-sm { font-size:13px; }
    .row-gap { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="fluid-bg"></div>

  <!-- Passcode gate -->
  <div id="gate" class="gate glass">
    <h2 style="margin:0 0 6px;">Admin access</h2>
    <p class="muted muted-sm" style="margin:0;">Enter the owner passcode to continue.</p>
    <input id="passInput" type="password" placeholder="Passcode" autocomplete="current-password" />
    <button id="unlockBtn" class="btn" style="width:100%;">Unlock</button>
    <div id="gateErr" class="err hidden"></div>
  </div>

  <!-- Dashboard -->
  <main id="app" class="admin-wrap hidden">
    <div class="topbar">
      <h1>Reminders Admin</h1>
      <div class="row-gap">
        <button id="refreshBtn" class="btn btn-ghost btn-sm">Refresh</button>
        <button id="lockBtn" class="btn btn-ghost btn-sm">Lock</button>
      </div>
    </div>
    <div id="totals" class="totals glass"></div>
    <div id="appErr" class="err hidden"></div>
    <div id="accounts"></div>
  </main>

  <script>
    (function () {
      var SKEY = 'rb_reminders_admin';
      var passcode = sessionStorage.getItem(SKEY) || '';

      var gate = document.getElementById('gate');
      var app = document.getElementById('app');
      var passInput = document.getElementById('passInput');
      var unlockBtn = document.getElementById('unlockBtn');
      var gateErr = document.getElementById('gateErr');
      var refreshBtn = document.getElementById('refreshBtn');
      var lockBtn = document.getElementById('lockBtn');
      var totalsEl = document.getElementById('totals');
      var accountsEl = document.getElementById('accounts');
      var appErr = document.getElementById('appErr');

      function authHeaders() {
        return { 'authorization': 'Bearer ' + passcode };
      }

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function money(n) {
        return '$' + (Math.round((Number(n) || 0) * 100) / 100).toFixed(2);
      }

      function showGate(msg) {
        passcode = '';
        sessionStorage.removeItem(SKEY);
        app.classList.add('hidden');
        gate.classList.remove('hidden');
        if (msg) { gateErr.textContent = msg; gateErr.classList.remove('hidden'); }
        else { gateErr.classList.add('hidden'); }
      }

      function showApp() {
        gate.classList.add('hidden');
        app.classList.remove('hidden');
      }

      function appError(msg) {
        appErr.textContent = msg;
        appErr.classList.remove('hidden');
      }
      function clearAppError() {
        appErr.classList.add('hidden');
      }

      function pill(status) {
        var cls = status === 'active' ? 'pill-active' : (status === 'paused' ? 'pill-paused' : 'pill-pending');
        return '<span class="pill ' + cls + '">' + esc(status || 'pending') + '</span>';
      }

      function render(data) {
        var totals = data.totals || { calls: 0, cost_usd: 0 };
        totalsEl.innerHTML =
          '<div><div class="muted muted-sm">Calls placed</div><div class="big">' + (totals.calls || 0) + '</div></div>' +
          '<div><div class="muted muted-sm">Total cost</div><div class="big">' + money(totals.cost_usd) + '</div></div>';

        var accounts = data.accounts || [];
        if (!accounts.length) {
          accountsEl.innerHTML = '<div class="glass acct"><p class="muted" style="margin:0;">No accounts yet.</p></div>';
          return;
        }
        var html = '';
        accounts.forEach(function (a) {
          var approved = Number(a.approved) === 1;
          var badge = approved
            ? '<span class="badge badge-ok">&#10003; Approved</span>'
            : '<span class="badge badge-pending">&#9203; Pending</span>';
          var usage = a.usage || { calls: 0, cost_usd: 0 };

          var patientsHtml = '';
          (a.patients || []).forEach(function (p) {
            var canActivate = approved && (p.status === 'pending' || p.status === 'paused');
            patientsHtml +=
              '<div class="patient">' +
                '<span class="pname">' + esc(p.name) + '</span>' +
                '<span class="muted pphone">' + esc(p.phone_e164) + '</span>' +
                pill(p.status) +
                '<span class="spacer"></span>' +
                (canActivate
                  ? '<button class="btn btn-ghost btn-sm act-activate" data-pid="' + esc(p.id) + '">Activate</button>'
                  : '') +
              '</div>';
          });
          if (!patientsHtml) patientsHtml = '<p class="muted muted-sm" style="margin:0;">No patients.</p>';

          html +=
            '<div class="glass acct">' +
              '<div class="acct-head">' +
                '<span class="acct-email">' + esc(a.email) + '</span>' +
                '<div class="row-gap">' +
                  badge +
                  (approved
                    ? ''
                    : '<button class="btn btn-sm act-approve" data-email="' + esc(a.email) + '">Approve</button>') +
                '</div>' +
              '</div>' +
              '<div class="acct-usage muted">' + (usage.calls || 0) + ' calls &middot; ' + money(usage.cost_usd) + '</div>' +
              '<div class="patients">' + patientsHtml + '</div>' +
            '</div>';
        });
        accountsEl.innerHTML = html;
        wireActions(accounts);
      }

      function wireActions(accounts) {
        var byEmail = {};
        accounts.forEach(function (a) { byEmail[a.email] = a; });

        Array.prototype.forEach.call(document.querySelectorAll('.act-approve'), function (btn) {
          btn.addEventListener('click', function () {
            var email = btn.getAttribute('data-email');
            btn.disabled = true; btn.textContent = 'Approving…';
            approveAccount(email, byEmail[email]).then(load).catch(function (e) {
              appError('Approve failed: ' + e.message);
              btn.disabled = false; btn.textContent = 'Approve';
            });
          });
        });

        Array.prototype.forEach.call(document.querySelectorAll('.act-activate'), function (btn) {
          btn.addEventListener('click', function () {
            var pid = btn.getAttribute('data-pid');
            btn.disabled = true; btn.textContent = 'Activating…';
            activatePatient(pid).then(load).catch(function (e) {
              appError('Activate failed: ' + e.message);
              btn.disabled = false; btn.textContent = 'Activate';
            });
          });
        });
      }

      function postApprove(body) {
        return fetch('/reminders/api/admin/approve', {
          method: 'POST',
          headers: Object.assign({ 'content-type': 'application/json' }, authHeaders()),
          body: JSON.stringify(body)
        }).then(function (res) {
          if (res.status === 401) { showGate('Incorrect passcode.'); throw new Error('unauthorized'); }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        });
      }

      function approveAccount(email, account) {
        return postApprove({ accountEmail: email }).then(function () {
          var patients = (account && account.patients) || [];
          return Promise.all(patients.map(function (p) {
            return postApprove({ activatePatientId: p.id });
          }));
        });
      }

      function activatePatient(pid) {
        return postApprove({ activatePatientId: Number(pid) });
      }

      function load() {
        clearAppError();
        return fetch('/reminders/api/admin/pending', { headers: authHeaders() })
          .then(function (res) {
            if (res.status === 401) { showGate('Incorrect passcode.'); throw new Error('unauthorized'); }
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            if (!data || !data.ok) throw new Error((data && data.error) || 'unexpected response');
            showApp();
            render(data);
          })
          .catch(function (e) {
            if (e.message !== 'unauthorized') appError('Could not load data: ' + e.message);
          });
      }

      unlockBtn.addEventListener('click', function () {
        var v = (passInput.value || '').trim();
        if (!v) { gateErr.textContent = 'Enter a passcode.'; gateErr.classList.remove('hidden'); return; }
        passcode = v;
        sessionStorage.setItem(SKEY, passcode);
        gateErr.classList.add('hidden');
        load();
      });
      passInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') unlockBtn.click();
      });

      refreshBtn.addEventListener('click', load);
      lockBtn.addEventListener('click', function () { showGate(); });

      // Auto-load if a passcode was stored from a previous session.
      if (passcode) load();
    })();
  </script>
</body>
</html>
