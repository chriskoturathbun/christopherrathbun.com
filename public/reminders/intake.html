<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get started — Reminders</title>
  <meta name="description" content="Set up daily medication reminder calls for yourself or a loved one — a warm AI voice that calls on time, every time." />
  <link rel="stylesheet" href="/reminders/reminders.css" />
  <style>
    .intake-main { max-width: 640px; margin: 0 auto; padding: 6vh 20px 8vh; }
    .card { padding: 34px clamp(22px, 5vw, 40px); }
    .brand { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; max-width: 1080px; margin: 0 auto; }
    .brand strong { font-size: 18px; letter-spacing: -0.01em; }

    .progress { margin-bottom: 8px; }
    .progress-label { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
    .progress-track { margin-top: 10px; height: 5px; border-radius: 999px; background: var(--glass-strong); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(120deg, var(--accent), var(--accent-2)); transition: width .25s ease; }

    .step-head { margin: 22px 0 6px; font-size: clamp(24px, 4vw, 32px); letter-spacing: -0.01em; }
    .step-sub { margin: 0 0 22px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 14px; margin-bottom: 7px; color: var(--text); }
    .field .optional { color: var(--muted); font-weight: 400; }
    input[type=text], input[type=tel], input[type=email], select {
      width: 100%; padding: 13px 15px; font-size: 16px; font-family: var(--font);
      color: var(--text); background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 14px; outline: none;
      transition: border-color .15s ease, background .15s ease;
      -webkit-appearance: none; appearance: none;
    }
    input::placeholder { color: rgba(244,246,251,0.38); }
    input:focus, select:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
    select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23a9b3c9' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat; background-position: right 15px center; padding-right: 38px; }
    select option { background: #11131b; color: var(--text); }

    .choice-grid { display: grid; gap: 14px; margin-top: 8px; }
    .choice {
      width: 100%; text-align: left; padding: 22px 22px; border-radius: 18px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);
      font-size: 18px; font-weight: 600; font-family: var(--font); cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .choice:hover { transform: translateY(-2px); border-color: var(--accent); background: rgba(255,255,255,0.08); }
    .choice .choice-sub { display: block; font-size: 14px; font-weight: 400; margin-top: 5px; color: var(--muted); }

    .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .row-grid { grid-template-columns: 1fr; } }

    .check { display: flex; gap: 12px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .check:last-of-type { border-bottom: none; }
    .check input { width: 20px; height: 20px; margin-top: 2px; flex: 0 0 auto; accent-color: var(--accent); cursor: pointer; }
    .check label { cursor: pointer; font-size: 15px; line-height: 1.45; }
    .legal { margin: 16px 0 0; font-size: 14px; }
    .legal a { color: var(--accent); }

    .med {
      position: relative; padding: 18px; margin-bottom: 14px;
      border: 1px solid var(--border); border-radius: 16px; background: rgba(255,255,255,0.035);
    }
    .med .med-num { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }
    .med-remove {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 999px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .med-remove:hover { color: var(--text); border-color: var(--accent); }
    .add-med {
      width: 100%; padding: 13px; margin-top: 4px; border-radius: 14px;
      background: rgba(255,255,255,0.05); border: 1px dashed var(--border); color: var(--text);
      font-size: 15px; font-family: var(--font); cursor: pointer; transition: border-color .15s ease;
    }
    .add-med:hover { border-color: var(--accent); }

    .demo-call { padding: 16px; border: 1px solid var(--border); border-radius: 16px; background: rgba(255,255,255,0.035); }
    .demo-row { display: flex; gap: 10px; align-items: stretch; }
    .demo-row input { flex: 1 1 auto; }
    .demo-row .btn { flex: 0 0 auto; font-size: 14px; padding: 0 18px; white-space: nowrap; }
    @media (max-width: 520px) { .demo-row { flex-direction: column; } .demo-row .btn { padding: 13px 18px; } }
    .demo-msg.is-error { color: #ffc2c2; }
    .demo-msg.is-ok { color: var(--accent); }

    .nav-row { display: flex; gap: 12px; justify-content: space-between; margin-top: 26px; }
    .nav-row .btn { font-size: 15px; padding: 13px 24px; }
    .btn[disabled] { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .errors { border: 1px solid rgba(255,120,120,0.55); background: rgba(255,80,80,0.10); border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; }
    .errors strong { color: #ff9a9a; display: block; margin-bottom: 6px; font-size: 14px; }
    .errors ul { margin: 0; padding-left: 18px; }
    .errors li { color: #ffc2c2; font-size: 14px; margin: 2px 0; }

    .review-group { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .review-group:last-of-type { border-bottom: none; }
    .review-group h4 { margin: 0 0 8px; font-size: 13px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .review-line { font-size: 15px; margin: 3px 0; }
    .review-line .rk { color: var(--muted); }
    .review-med { font-size: 15px; margin: 4px 0; }
    .note { margin-top: 18px; font-size: 14px; }

    .success { text-align: center; padding: 14px 0 8px; }
    .success .ck {
      width: 72px; height: 72px; border-radius: 999px; margin: 0 auto 22px;
      display: flex; align-items: center; justify-content: center; font-size: 36px; color: #0a0c12;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }
  </style>
</head>
<body>
  <div class="fluid-bg"></div>

  <header class="brand">
    <a href="/reminders" style="text-decoration:none;color:inherit;"><strong>Reminders</strong></a>
    <a href="/reminders/dashboard" class="btn btn-ghost" style="padding:10px 18px;">Sign in</a>
  </header>

  <main class="intake-main">
    <div class="glass card" id="card"><!-- rendered by JS --></div>
  </main>

  <script>
  (function () {
    'use strict';

    var TIMEZONES = [
      'America/Los_Angeles', 'America/Denver', 'America/Chicago',
      'America/New_York', 'America/Anchorage', 'Pacific/Honolulu'
    ];
    var FREQUENCIES = [
      ['once_daily', 'Once daily'],
      ['twice_daily', 'Twice daily'],
      ['three_times_daily', 'Three times daily'],
      ['every_8h', 'Every 8 hours'],
      ['every_12h', 'Every 12 hours'],
      ['custom', 'Custom']
    ];
    var TIMINGS = [
      ['morning', 'Morning'],
      ['noon', 'Noon'],
      ['evening', 'Evening'],
      ['bedtime', 'Bedtime'],
      ['with_food', 'With food'],
      ['empty_stomach', 'Empty stomach'],
      ['specific_time', 'Specific time']
    ];

    var VOICES = [
      ['june', 'June — warm & friendly (default)'],
      ['17a0eab8-d7d5-4304-bb41-7a7b6bda96d3', 'Grace — warm, Southern'],
      ['bbeabae6-ec8d-444f-92ad-c8e620d3de8d', 'Tina — gentle'],
      ['aec18940-3d5a-4454-acd2-66f685e83b67', 'Martha — casual & friendly'],
      ['ff2c405b-3dba-41e0-9261-bc8ee3f91f46', 'David — reassuring'],
      ['17e8f694-d230-4b64-b040-6108088d9e6c', 'Dorothy — British']
    ];

    var STEPS = ['flow', 'patient', 'purchaser', 'emergency', 'consent', 'medicines', 'review'];
    var TOTAL = STEPS.length;

    function detectTz() {
      try {
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (TIMEZONES.indexOf(tz) !== -1) return tz;
      } catch (e) {}
      return 'America/New_York';
    }

    var state = {
      step: 0,
      flow: '',
      relationship: '',
      patient: { name: '', phone: '', timezone: detectTz(), preferred_name: '', voice: 'june' },
      demoPhone: '',
      purchaser: { name: '', email: '', phone: '' },
      emergency: { name: '', phone: '', email: '', relationship: '' },
      consent: { tcpa: false, recording: false, attestation: false },
      medicines: [{ name: '', dose: '', frequency: 'once_daily', timing: 'morning' }],
      errors: []
    };

    var card = document.getElementById('card');

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function label(pairs, val) {
      for (var i = 0; i < pairs.length; i++) if (pairs[i][0] === val) return pairs[i][1];
      return val;
    }
    function optionsHtml(pairs, selected) {
      return pairs.map(function (p) {
        return '<option value="' + p[0] + '"' + (p[0] === selected ? ' selected' : '') + '>' + esc(p[1]) + '</option>';
      }).join('');
    }
    function tzOptionsHtml(selected) {
      return TIMEZONES.map(function (tz) {
        return '<option value="' + tz + '"' + (tz === selected ? ' selected' : '') + '>' + esc(tz.replace('_', ' ')) + '</option>';
      }).join('');
    }
    function errorsHtml() {
      if (!state.errors || !state.errors.length) return '';
      return '<div class="errors"><strong>Please fix the following:</strong><ul>' +
        state.errors.map(function (e) { return '<li>' + esc(e) + '</li>'; }).join('') + '</ul></div>';
    }
    function progressHtml() {
      var pct = Math.round(((state.step + 1) / TOTAL) * 100);
      return '<div class="progress"><div class="progress-label muted">Step ' + (state.step + 1) + ' of ' + TOTAL + '</div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    }

    function render() {
      var name = STEPS[state.step];
      var html = progressHtml() + errorsHtml();
      if (name === 'flow') html += renderFlow();
      else if (name === 'patient') html += renderPatient();
      else if (name === 'purchaser') html += renderPurchaser();
      else if (name === 'emergency') html += renderEmergency();
      else if (name === 'consent') html += renderConsent();
      else if (name === 'medicines') html += renderMedicines();
      else if (name === 'review') html += renderReview();
      card.innerHTML = html;
      wire(name);
      card.scrollIntoView({ block: 'start' });
    }

    function navHtml(nextLabel, nextDisabled) {
      return '<div class="nav-row">' +
        '<button class="btn btn-ghost" data-act="back">Back</button>' +
        '<button class="btn" data-act="next"' + (nextDisabled ? ' disabled' : '') + '>' + (nextLabel || 'Next') + '</button>' +
        '</div>';
    }

    /* ---- Step renderers ---- */

    function renderFlow() {
      return '<h2 class="step-head">Who is this for?</h2>' +
        '<p class="step-sub muted">We\'ll tailor the setup based on your answer.</p>' +
        '<div class="choice-grid">' +
          '<button class="choice" data-flow="self">I\'m signing up for myself<span class="choice-sub">The reminder calls will come to you.</span></button>' +
          '<button class="choice" data-flow="loved_one">I\'m signing up for a loved one<span class="choice-sub">Set up reminders on behalf of someone you care for.</span></button>' +
        '</div>';
    }

    function renderPatient() {
      var loved = state.flow === 'loved_one';
      var p = state.patient;
      var relField = loved ?
        '<div class="field"><label>Your relationship to them (e.g. grandmother)</label>' +
        '<input type="text" data-bind="relationship" value="' + esc(state.relationship) + '" placeholder="grandmother" /></div>' : '';
      var demoPhone = state.demoPhone || p.phone;
      return '<h2 class="step-head">' + (loved ? 'Their details' : 'Your details') + '</h2>' +
        '<p class="step-sub muted">Who should we call, and when?</p>' +
        '<div class="field"><label>Name</label><input type="text" data-bind="patient.name" value="' + esc(p.name) + '" placeholder="Rose Miller" /></div>' +
        '<div class="field"><label>Phone</label><input type="tel" data-bind="patient.phone" value="' + esc(p.phone) + '" placeholder="(555) 123-4567" /></div>' +
        '<div class="field"><label>Time zone</label><select data-bind="patient.timezone">' + tzOptionsHtml(p.timezone) + '</select></div>' +
        '<div class="field"><label>What should the agent call them on the call?</label>' +
          '<input type="text" data-bind="patient.preferred_name" value="' + esc(p.preferred_name) + '" placeholder="Grandma Rose, Rose, Mom…" />' +
          '<p class="step-sub muted" style="margin:7px 0 0;font-size:13px;">Leave blank to use their name.</p></div>' +
        '<div class="field"><label>Voice</label><select data-bind="patient.voice">' + optionsHtml(VOICES, p.voice) + '</select></div>' +
        '<div class="field demo-call">' +
          '<label>Hear this voice — call my phone</label>' +
          '<div class="demo-row">' +
            '<input type="tel" id="demo-phone" value="' + esc(demoPhone) + '" placeholder="(555) 123-4567" />' +
            '<button type="button" class="btn" id="demo-btn">🔊 Hear this voice</button>' +
          '</div>' +
          '<p class="demo-msg muted" id="demo-msg" style="margin:9px 0 0;font-size:13px;"></p>' +
        '</div>' +
        relField +
        navHtml('Next', false);
    }

    function renderPurchaser() {
      var p = state.purchaser;
      var sub = state.flow === 'self' ? 'This is you.' : 'How we reach you with updates.';
      return '<h2 class="step-head">Your contact info</h2>' +
        '<p class="step-sub muted">' + sub + '</p>' +
        '<div class="field"><label>Name</label><input type="text" data-bind="purchaser.name" value="' + esc(p.name) + '" placeholder="Your name" /></div>' +
        '<div class="field"><label>Email</label><input type="email" data-bind="purchaser.email" value="' + esc(p.email) + '" placeholder="you@example.com" /></div>' +
        '<div class="field"><label>Phone</label><input type="tel" data-bind="purchaser.phone" value="' + esc(p.phone) + '" placeholder="(555) 123-4567" /></div>' +
        navHtml('Next', false);
    }

    function renderEmergency() {
      var e = state.emergency;
      return '<h2 class="step-head">Emergency contact</h2>' +
        '<p class="step-sub muted">Who we alert if something needs attention.</p>' +
        '<div class="field"><label>Name</label><input type="text" data-bind="emergency.name" value="' + esc(e.name) + '" placeholder="Contact name" /></div>' +
        '<div class="field"><label>Phone</label><input type="tel" data-bind="emergency.phone" value="' + esc(e.phone) + '" placeholder="(555) 123-4567" /></div>' +
        '<div class="field"><label>Email <span class="optional">(optional)</span></label><input type="email" data-bind="emergency.email" value="' + esc(e.email) + '" placeholder="optional@example.com" /></div>' +
        '<div class="field"><label>Relationship</label><input type="text" data-bind="emergency.relationship" value="' + esc(e.relationship) + '" placeholder="Daughter" /></div>' +
        navHtml('Next', false);
    }

    function renderConsent() {
      var loved = state.flow === 'loved_one';
      var c = state.consent;
      var att = loved ?
        '<div class="check"><input type="checkbox" id="c-att" data-bind="consent.attestation"' + (c.attestation ? ' checked' : '') + ' />' +
        '<label for="c-att">I confirm I have this person\'s permission to set up reminders for them.</label></div>' : '';
      return '<h2 class="step-head">Consent</h2>' +
        '<p class="step-sub muted">Required before any calls can be scheduled.</p>' +
        '<div class="check"><input type="checkbox" id="c-tcpa" data-bind="consent.tcpa"' + (c.tcpa ? ' checked' : '') + ' />' +
          '<label for="c-tcpa">I consent to receive automated AI voice phone calls at this number.</label></div>' +
        '<div class="check"><input type="checkbox" id="c-rec" data-bind="consent.recording"' + (c.recording ? ' checked' : '') + ' />' +
          '<label for="c-rec">I understand calls are recorded and transcribed.</label></div>' +
        att +
        '<p class="legal muted">See our <a href="/reminders/privacy">Privacy Policy</a> and <a href="/reminders/terms">Terms</a>.</p>' +
        navHtml('Next', !consentComplete());
    }

    function renderMedicines() {
      var rows = state.medicines.map(function (m, i) {
        var removeBtn = i > 0 ? '<button class="med-remove" data-rm="' + i + '" title="Remove">&times;</button>' : '';
        return '<div class="med">' + removeBtn +
          '<div class="med-num muted">Medicine ' + (i + 1) + '</div>' +
          '<div class="field" style="margin-top:10px;"><label>Name</label><input type="text" data-med="' + i + '" data-key="name" value="' + esc(m.name) + '" placeholder="e.g. Lisinopril" /></div>' +
          '<div class="row-grid">' +
            '<div class="field"><label>Dose</label><input type="text" data-med="' + i + '" data-key="dose" value="' + esc(m.dose) + '" placeholder="10mg" /></div>' +
            '<div class="field"><label>Frequency</label><select data-med="' + i + '" data-key="frequency">' + optionsHtml(FREQUENCIES, m.frequency) + '</select></div>' +
          '</div>' +
          '<div class="field"><label>Timing</label><select data-med="' + i + '" data-key="timing">' + optionsHtml(TIMINGS, m.timing) + '</select></div>' +
        '</div>';
      }).join('');
      return '<h2 class="step-head">Medications</h2>' +
        '<p class="step-sub muted">Add each medication and when it should be taken.</p>' +
        rows +
        '<button class="add-med" data-act="add-med">+ Add another medicine</button>' +
        navHtml('Next', false);
    }

    function renderReview() {
      var loved = state.flow === 'loved_one';
      function line(k, v) { return '<div class="review-line"><span class="rk">' + esc(k) + ':</span> ' + esc(v || '—') + '</div>'; }
      var meds = state.medicines.filter(function (m) { return m.name.trim(); }).map(function (m) {
        var parts = [m.name.trim()];
        if (m.dose.trim()) parts.push(m.dose.trim());
        parts.push(label(FREQUENCIES, m.frequency));
        parts.push(label(TIMINGS, m.timing));
        return '<div class="review-med">• ' + esc(parts.join(' · ')) + '</div>';
      }).join('') || '<div class="review-med muted">No medicines added.</div>';

      var consentItems = ['Automated calls consent', 'Recording &amp; transcription'];
      if (loved) consentItems.push('Permission attestation');

      var relLine = loved && state.relationship ? line('Relationship', state.relationship) : '';

      return '<h2 class="step-head">Review &amp; confirm</h2>' +
        '<p class="step-sub muted">Check everything looks right before submitting.</p>' +
        '<div class="review-group"><h4>' + (loved ? 'Care recipient' : 'You (recipient)') + '</h4>' +
          line('Name', state.patient.name) + line('Phone', state.patient.phone) + line('Time zone', state.patient.timezone) + relLine + '</div>' +
        '<div class="review-group"><h4>Your contact info</h4>' +
          line('Name', state.purchaser.name) + line('Email', state.purchaser.email) + line('Phone', state.purchaser.phone) + '</div>' +
        '<div class="review-group"><h4>Emergency contact</h4>' +
          line('Name', state.emergency.name) + line('Phone', state.emergency.phone) +
          (state.emergency.email ? line('Email', state.emergency.email) : '') +
          line('Relationship', state.emergency.relationship) + '</div>' +
        '<div class="review-group"><h4>Consent given</h4><div class="review-line">' + consentItems.join(', ') + '</div></div>' +
        '<div class="review-group"><h4>Medications</h4>' + meds + '</div>' +
        '<p class="note muted">Your account will be pending approval before any calls begin.</p>' +
        '<div class="nav-row">' +
          '<button class="btn btn-ghost" data-act="back">Back</button>' +
          '<button class="btn" data-act="submit">Submit</button>' +
        '</div>';
    }

    function renderSuccess() {
      card.innerHTML = '<div class="success">' +
        '<div class="ck">&#10003;</div>' +
        '<h2 class="step-head" style="margin-top:0;">You\'re all set</h2>' +
        '<p class="muted" style="max-width:420px;margin:0 auto 26px;">Your account is pending approval. We\'ll be in touch before calls begin.</p>' +
        '<a href="/reminders/dashboard" class="btn">Go to dashboard</a>' +
        '</div>';
    }

    /* ---- State helpers ---- */

    function setBind(path, value) {
      var parts = path.split('.');
      if (parts.length === 1) { state[parts[0]] = value; return; }
      state[parts[0]][parts[1]] = value;
    }
    function consentComplete() {
      if (!state.consent.tcpa || !state.consent.recording) return false;
      if (state.flow === 'loved_one' && !state.consent.attestation) return false;
      return true;
    }

    /* ---- Validation ---- */

    function validateStep() {
      var name = STEPS[state.step];
      var errs = [];
      if (name === 'patient') {
        if (!state.patient.name.trim()) errs.push('Name is required.');
        if (!state.patient.phone.trim()) errs.push('Phone is required.');
        if (!state.patient.timezone.trim()) errs.push('Time zone is required.');
      } else if (name === 'purchaser') {
        if (!state.purchaser.name.trim()) errs.push('Name is required.');
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(state.purchaser.email.trim())) errs.push('A valid email is required.');
        if (!state.purchaser.phone.trim()) errs.push('Phone is required.');
      } else if (name === 'emergency') {
        if (!state.emergency.name.trim()) errs.push('Emergency contact name is required.');
        if (!state.emergency.phone.trim()) errs.push('Emergency contact phone is required.');
        if (state.emergency.email.trim() && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(state.emergency.email.trim())) errs.push('Emergency email is not valid.');
      } else if (name === 'consent') {
        if (!consentComplete()) errs.push('Please check all required consent boxes.');
      } else if (name === 'medicines') {
        if (!state.medicines.some(function (m) { return m.name.trim(); })) errs.push('Add at least one medicine with a name.');
      }
      return errs;
    }

    /* ---- Navigation ---- */

    function goNext() {
      var errs = validateStep();
      if (errs.length) { state.errors = errs; render(); return; }
      state.errors = [];
      if (state.step < TOTAL - 1) { state.step++; render(); }
    }
    function goBack() {
      state.errors = [];
      if (state.step > 0) { state.step--; render(); }
    }

    function buildPayload() {
      return {
        flow: state.flow === 'self' ? 'self' : 'loved_one',
        relationship: state.relationship.trim(),
        patient: {
          name: state.patient.name.trim(),
          phone: state.patient.phone.trim(),
          timezone: state.patient.timezone.trim(),
          preferred_name: (state.patient.preferred_name || '').trim(),
          voice: state.patient.voice || 'june'
        },
        purchaser: {
          name: state.purchaser.name.trim(),
          email: state.purchaser.email.trim(),
          phone: state.purchaser.phone.trim()
        },
        emergency: {
          name: state.emergency.name.trim(),
          phone: state.emergency.phone.trim(),
          email: state.emergency.email.trim(),
          relationship: state.emergency.relationship.trim()
        },
        consent: {
          tcpa: !!state.consent.tcpa,
          recording: !!state.consent.recording,
          attestation: !!state.consent.attestation
        },
        medicines: state.medicines
          .filter(function (m) { return m.name.trim(); })
          .map(function (m) {
            return { name: m.name.trim(), dose: m.dose.trim(), frequency: m.frequency, timing: m.timing };
          })
      };
    }

    function submit(btn) {
      if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
      fetch('/reminders/api/intake', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(buildPayload())
      }).then(function (res) { return res.json(); })
        .then(function (data) {
          if (data && data.ok) { renderSuccess(); return; }
          state.errors = (data && Array.isArray(data.errors) && data.errors.length) ? data.errors : ['Something went wrong. Please try again.'];
          render();
        })
        .catch(function () {
          state.errors = ['Network error. Please check your connection and try again.'];
          render();
        });
    }

    /* ---- Wiring (per render) ---- */

    function wire(name) {
      // Flow choice buttons
      var choices = card.querySelectorAll('[data-flow]');
      for (var i = 0; i < choices.length; i++) {
        choices[i].addEventListener('click', function () {
          state.flow = this.getAttribute('data-flow');
          state.errors = [];
          state.step = 1;
          render();
        });
      }

      // Generic bound inputs (text/tel/email/select)
      var binds = card.querySelectorAll('[data-bind]');
      for (var b = 0; b < binds.length; b++) {
        var el = binds[b];
        if (el.type === 'checkbox') {
          el.addEventListener('change', function () {
            setBind(this.getAttribute('data-bind'), this.checked);
            if (name === 'consent') {
              var nb = card.querySelector('[data-act="next"]');
              if (nb) nb.disabled = !consentComplete();
            }
          });
        } else {
          el.addEventListener('input', function () {
            setBind(this.getAttribute('data-bind'), this.value);
          });
        }
      }

      // Medicine inputs
      var medEls = card.querySelectorAll('[data-med]');
      for (var m = 0; m < medEls.length; m++) {
        medEls[m].addEventListener('input', function () {
          var idx = parseInt(this.getAttribute('data-med'), 10);
          var key = this.getAttribute('data-key');
          state.medicines[idx][key] = this.value;
        });
      }
      // Medicine remove
      var rms = card.querySelectorAll('[data-rm]');
      for (var r = 0; r < rms.length; r++) {
        rms[r].addEventListener('click', function () {
          var idx = parseInt(this.getAttribute('data-rm'), 10);
          state.medicines.splice(idx, 1);
          render();
        });
      }
      // Add medicine
      var addBtn = card.querySelector('[data-act="add-med"]');
      if (addBtn) addBtn.addEventListener('click', function () {
        state.medicines.push({ name: '', dose: '', frequency: 'once_daily', timing: 'morning' });
        render();
      });

      // Nav buttons
      var backBtn = card.querySelector('[data-act="back"]');
      if (backBtn) backBtn.addEventListener('click', goBack);
      var nextBtn = card.querySelector('[data-act="next"]');
      if (nextBtn) nextBtn.addEventListener('click', goNext);
      var submitBtn = card.querySelector('[data-act="submit"]');
      if (submitBtn) submitBtn.addEventListener('click', function () { submit(this); });

      // Demo-call control (patient step)
      var demoPhoneEl = card.querySelector('#demo-phone');
      if (demoPhoneEl) {
        demoPhoneEl.addEventListener('input', function () { state.demoPhone = this.value; });
      }
      var demoBtn = card.querySelector('#demo-btn');
      if (demoBtn) demoBtn.addEventListener('click', function () { placeDemoCall(this); });
    }

    function placeDemoCall(btn) {
      var phoneEl = card.querySelector('#demo-phone');
      var msgEl = card.querySelector('#demo-msg');
      var phone = phoneEl ? phoneEl.value.trim() : '';
      function showMsg(text, ok) {
        if (!msgEl) return;
        msgEl.textContent = text;
        msgEl.className = 'demo-msg ' + (ok ? 'is-ok' : 'is-error');
      }
      if (!phone) { showMsg('Enter a phone number to call.', false); return; }
      var origText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Calling…';
      showMsg('', true);
      var payload = {
        phone: phone,
        voice: state.patient.voice || 'june',
        callName: (state.patient.preferred_name || '').trim() || state.patient.name
      };
      fetch('/reminders/api/demo-call', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
        .then(function (r) {
          var d = r.data || {};
          if (r.ok && d.ok) showMsg(d.message || 'Calling you now — answer to hear it.', true);
          else showMsg(d.error || 'Could not place the demo call right now.', false);
        })
        .catch(function () {
          showMsg('Network error. Please check your connection and try again.', false);
        });
      // Re-enable after ~20s to prevent double-taps.
      setTimeout(function () {
        if (btn && card.contains(btn)) { btn.disabled = false; btn.textContent = origText; }
      }, 20000);
    }

    render();
  })();
  </script>
</body>
</html>
