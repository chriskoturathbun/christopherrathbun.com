# XcodeGen spec — run ./bootstrap.sh (or `xcodegen generate`) to produce
# ClaudeApprove.xcodeproj with both targets fully wired: sources, watch-app
# embedding, push entitlements, and the claudeapprove:// config URL scheme.
name: ClaudeApprove
options:
  bundleIdPrefix: com.christopherrathbun
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  ClaudeApprove:
    type: application
    platform: iOS
    sources:
      - iOSApp
      - Shared
    dependencies:
      - target: ClaudeApproveWatch
    entitlements:
      path: iOSApp/ClaudeApprove.entitlements
      properties:
        aps-environment: development
    info:
      path: iOSApp/Info.plist
      properties:
        CFBundleDisplayName: Claude Approve
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: config
            CFBundleURLSchemes: [claudeapprove]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.christopherrathbun.ClaudeApprove

  ClaudeApproveWatch:
    type: application
    platform: watchOS
    sources:
      - WatchApp
      - Shared
    entitlements:
      path: WatchApp/ClaudeApproveWatch.entitlements
      properties:
        aps-environment: development
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Claude Approve
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.christopherrathbun.ClaudeApprove
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.christopherrathbun.ClaudeApprove.watchkitapp
