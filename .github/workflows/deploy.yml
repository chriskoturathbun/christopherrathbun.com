name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check Cloudflare token is configured
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::The CLOUDFLARE_API_TOKEN repository secret is MISSING or EMPTY. Add it under Settings → Secrets and variables → Actions → Repository secrets (name must be exactly CLOUDFLARE_API_TOKEN)."
            exit 1
          fi
          echo "Cloudflare token secret is present."
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.110.0"
          command: deploy --config ./wrangler.toml
