name = "christopherrathbun-home"
main = "src/worker.js"
compatibility_date = "2025-11-01"
account_id = "edb3337a8ff089aa78cc6cb75e2d15d4"
workers_dev = false

routes = [
  { pattern = "christopherrathbun.com",       zone_name = "christopherrathbun.com" },
  { pattern = "christopherrathbun.com/*",      zone_name = "christopherrathbun.com" },
  { pattern = "www.christopherrathbun.com",    zone_name = "christopherrathbun.com" },
  { pattern = "www.christopherrathbun.com/*",  zone_name = "christopherrathbun.com" }
]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/twistedchess", "/twistedchess/*", "/sentry", "/sentry/*", "/stella-in-the-woods", "/stella-in-the-woods/", "/stella-in-the-woods-countdown", "/stella-in-the-woods-countdown/", "/vighnaatextllm", "/vighnaatextllm/*", "/users", "/users/*", "/api/users", "/api/users/*", "/reminders", "/reminders/*"]

[vars]
SENTRY_ORG = "lilac-impact-ventures-llc"
ALLOWED_EMAIL = "rathbunchristopher18@gmail.com"
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsuY2hyaXN0b3BoZXJyYXRoYnVuLmNvbSQ"
CLERK_ISSUER = "https://clerk.christopherrathbun.com"
# CLERK_API_KEY is set via: wrangler secret put CLERK_API_KEY
# It's automatically available in env.CLERK_API_KEY at runtime

[observability]
enabled = true

[[durable_objects.bindings]]
name = "TWISTED_CHESS"
class_name = "TwistedChessGame"

[[d1_databases]]
binding = "DB"
database_name = "christopherrathbun_users"
database_id = "62218bf5-8dbd-4c9e-8d86-6ddd82182fb6"

# NOTE: the analytics_events table is created on-demand by users-dashboard.js
# (ensureSchema), so no D1 migration is needed here.

[[d1_databases]]
binding = "REMINDERS_DB"
database_name = "reminders"
database_id = "35a987be-44dc-43b3-9680-9e835cc8efa0"

# NOTE: schema is created on-demand by src/reminders.js (ensureSchema),
# so no D1 migration is needed here.

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TwistedChessGame"]

# v2 was previously applied (an attempted D1 table migration that wrangler
# ignored). Kept as a no-op so the migration history stays consistent.
[[migrations]]
tag = "v2"

[triggers]
crons = ["* * * * *", "0 * * * *"]
